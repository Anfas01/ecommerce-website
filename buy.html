<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Summary</title>
  <link rel="stylesheet" href="styles/buy.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script type="module" src="scripts/buy.js" defer></script>
</head>
<body>
  <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
  <main class="checkout-container">
    
    <!-- Left Column: Delivery Form -->
    <section class="form-column">
      <h2 class="column-title">Delivery Details</h2>
      <form class="delivery-form">
        
        <!-- Name Row -->
        <div class="input-row">
          <div class="input-field">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="firstname" placeholder="John" required>
          </div>
          <div class="input-field">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="lastname" placeholder="Doe" required>
          </div>
        </div>

        <!-- Contact Fields -->
        <div class="input-field">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="john.doe@example.com" required>
        </div>

        <div class="input-field">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="(555) 000-0000" required>
        </div>

        <hr class="form-divider">

        <!-- Address Fields -->
        <div class="input-field">
          <label for="address">Street Address</label>
          <input type="text" id="address" name="address" placeholder="123 Main St, Apt 4B" required>
        </div>

        <!-- City/State/Zip Row -->
        <div class="input-row address-breakdown">
          <div class="input-field">
            <label for="city">City</label>
            <input type="text" id="city" name="city" placeholder="New York" required>
          </div>
          <div class="input-field size-small">
            <label for="state">State</label>
            <input type="text" id="state" name="state" placeholder="NY" required>
          </div>
          <div class="input-field size-medium">
            <label for="zipcode">ZIP Code</label>
            <input type="text" id="zipcode" name="zipcode" placeholder="10001" required>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-order-btn">Confirm Order</button>
      </form>
    </section>

    <!-- Right Column: Product Summary -->
    <section class="product-info">
      <div class="sticky-summary">
        <h2 class="column-title">Order Summary</h2>
        <div class="product-card"></div>
        <div class="price-breakdown"></div>
      </div>
    </section>

  </main>
</body>
</html>

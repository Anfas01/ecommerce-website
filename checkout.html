<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Order Summary Review | E-Commerce Hub</title>
  
  <!-- Shared Style Core Architectural Layout Dependency Cascades -->
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/checkout-shared.css">
  
  <!-- Font Awesome Style Vector Assets Layer -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <!-- Core Script Module Entry Engine Processing -->
  <script type="module" src="scripts/checkout.js" defer></script>
</head>
<body>

  <a href="index.html" class="back-btn-circle" aria-label="Cancel purchase transaction steps execution layout flow and return home">
    <i class="fa-solid fa-arrow-left"></i>
  </a>

  <main class="transaction-container">
    <!-- Left Column: Capture Delivery Metadata Form Component -->
    <section class="transaction-container__form-pane customer-form">
      <h2 class="customer-form__title">Delivery Details</h2>
      <form class="customer-form__body">
        
        <div class="customer-form__row">
          <div class="customer-form__input-group">
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" name="firstname" placeholder="John" required>
          </div>
          <div class="customer-form__input-group">
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" name="lastname" placeholder="Doe" required>
          </div>
        </div>

        <div class="customer-form__input-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="john.doe@example.com" required>
        </div>

        <div class="customer-form__input-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="(555) 000-0000" required>
        </div>

        <hr class="customer-form__divider">

        <div class="customer-form__input-group">
          <label for="address">Street Address</label>
          <input type="text" id="address" name="address" placeholder="123 Main St, Apt 4B" required>
        </div>

        <div class="customer-form__row customer-form__row--address-breakdown">
          <div class="customer-form__input-group customer-form__input-group--flex-two">
            <label for="city">City</label>
            <input type="text" id="city" name="city" placeholder="New York" required>
          </div>
          <div class="customer-form__input-group customer-form__input-group--flex-half">
            <label for="state">State</label>
            <input type="text" id="state" name="state" placeholder="NY" required>
          </div>
          <div class="customer-form__input-group customer-form__input-group--flex-one">
            <label for="zipcode">ZIP Code</label>
            <input type="text" id="zipcode" name="zipcode" placeholder="10001" required>
          </div>
        </div>

        <button type="submit" class="customer-form__submit-btn">Confirm Order</button>
      </form>
    </section>

    <!-- Right Column: Real-time Live Financial Invoice Calculation Panel -->
    <section class="transaction-container__summary-pane invoice-panel">
      <div class="invoice-panel__scroll-container target-checkout-items-list"></div>
      <div class="invoice-panel__pricing-breakdown target-checkout-pricing-summary"></div>
    </section>
  </main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <header>
  <div class="header-cart-container">
    <i class="fa-solid fa-cart-arrow-down cart-btn">
      <div class="cart-item-count"></div>
    </i>
  </div> 
  <div class="carts">
    <i class="fa-solid fa-xmark cart-close-btn"></i>
    <div class="carts-grid"></div>
    <div class="cart-checkout">
      <div class="subtotal-container"><span>Subtotal</span><span class="subtotal"></span></div>
      <button class="checkout-btn">Checkout</button>
    </div>
  </div>
</header>
  <div class="grid-container"></div>
</body>
</html>
